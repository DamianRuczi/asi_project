# Katalog danych Kedro — oddziela kod od ścieżek/formatów danych.
# Zbiory niewymienione tutaj (X_train, y_train, ...) są trzymane w pamięci.

hotels_raw:
  type: pandas.CSVDataset
  filepath: data/01_raw/hotel_bookings.csv

hotels_clean:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/hotels_clean.parquet

hotels_features:
  type: pandas.ParquetDataset
  filepath: data/04_feature/hotels_features.parquet

model_input:
  type: pandas.ParquetDataset
  filepath: data/05_model_input/model_input.parquet

model:
  type: pickle.PickleDataset
  filepath: data/06_models/model.pkl

model_features:
  type: json.JSONDataset
  filepath: data/06_models/model_features.json

metrics:
  type: json.JSONDataset
  filepath: data/08_reporting/metrics.json

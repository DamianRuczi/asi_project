# Ciągła integracja: lint + testy jednostkowe przy każdym pushu i pull requeście.
# CI nie trenuje modelu — testy API wykrywają brak artefaktów i pomijają się
# automatycznie (patrz tests/app/test_api.py), więc przebieg jest szybki i zielony.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalacja zaleznosci
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check src tests app

      - name: Testy jednostkowe (pytest)
        run: python -m pytest -q
